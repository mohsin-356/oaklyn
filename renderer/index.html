<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oaklyn POS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root{ --primary:#d32f2f; --accent:#ffca28; --bg:#fafafa; --card:#fff; --muted:#666; }
    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial; background:var(--bg); color:#111; }
    .center{ min-height:100%; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card{ width:min(520px, 94vw); background:var(--card); border-radius:14px; box-shadow:0 10px 35px rgba(0,0,0,.12); padding:24px; }
    .title{ font-size:22px; font-weight:800; }
    .muted{ color:var(--muted); }
    .row{ display:flex; gap:10px; }
    .input{ width:100%; padding:12px 14px; border-radius:10px; border:1px solid #ddd; font-size:14px; }
    .btn{ padding:10px 14px; border-radius:10px; border:1px solid var(--primary); background:var(--primary); color:#fff; cursor:pointer; font-weight:600; }
    .btn.secondary{ background:#fff; color:#111; border-color:#ddd; }
    .badge{ background:var(--accent); color:#111; padding:4px 8px; border-radius:999px; font-weight:700; font-size:12px; }
    .brand{ display:flex; align-items:center; gap:10px; margin-bottom:12px; }
    .brand .logo{ width:40px; height:40px; border-radius:10px; background:linear-gradient(135deg, var(--primary), #ff5252); position:relative; }
    .brand .logo::after{ content:''; position:absolute; width:18px; height:18px; background:var(--accent); border-radius:4px; right:-6px; bottom:-6px; box-shadow:0 4px 12px rgba(0,0,0,.2); }
    .foot{ margin-top:14px; font-size:12px; color:var(--muted); }
    .hidden{ display:none; }
    .ok{ background:#2e7d32; border-color:#2e7d32; }
    .error{ color:#b71c1c; font-weight:600; }
  </style>
</head>
<body>
  <div id="activate" class="center hidden">
    <div class="card">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <div class="title">Oaklyn POS</div>
          <div class="muted">Enter your license key to activate</div>
        </div>
      </div>
      <div style="margin-top:10px">
        <label class="muted" style="font-size:12px;">License key</label>
        <input id="license" class="input" placeholder="Paste license key here" />
      </div>
      <div style="margin-top:10px">
        <div class="muted" style="font-size:12px;">This Machine ID</div>
        <div class="row" style="align-items:center">
          <code id="machineId" style="font-size:12px; background:#f5f5f5; padding:8px; border-radius:8px; white-space:nowrap; overflow:auto; max-width:100%">Loading...</code>
          <button id="copyMid" class="btn secondary" style="white-space:nowrap">Copy</button>
        </div>
      </div>
      <div style="margin-top:12px" class="row" >
        <button id="activateBtn" class="btn">Activate</button>
        <button id="quitBtn" class="btn secondary">Quit</button>
      </div>
      <div id="status" class="foot"></div>
      <div class="foot">Need help? Contact support.</div>
    </div>
  </div>
  <div id="dashboard" class="center hidden">
    <div class="card">
      <div class="title">Oaklyn POS Activated</div>
      <div class="muted" style="margin-top:6px">Welcome! Your license is valid. Restaurant features coming soon.</div>
      <div style="margin-top:12px" class="row">
        <span class="badge">Activated</span>
      </div>
    </div>
  </div>
  <script src="renderer.js" type="module"></script>
</body>
</html>
